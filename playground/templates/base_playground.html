<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Enterprise Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --td-green: #818cf8;
            --td-green-dark: #6366f1;
            --td-bg: #0f1117;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e2e8f0; }

        .step-indicator {
            transition: all 0.3s ease;
        }
        .step-indicator.active {
            background-color: var(--td-green);
            color: white;
            transform: scale(1.1);
        }
        .step-indicator.completed {
            background-color: var(--td-green);
            color: white;
        }
        .step-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .step-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .accordion-content.open {
            max-height: 1000px;
        }
        .tooltip {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tooltip-trigger:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
        .progress-bar {
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="bg-[#0f1117] min-h-screen text-gray-200">
    <!-- Header -->
    <header class="bg-[#1a1d2e] shadow-sm border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold text-sm"
                     style="background-color: var(--td-green)">EP</div>
                <h1 class="text-lg font-semibold text-gray-200">{{ title }}</h1>
            </div>
            <span class="text-xs text-gray-400 bg-white/5 px-2 py-1 rounded">
                Enterprise Playground
            </span>
        </div>
    </header>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-gray-400">
            Generated by Enterprise Playground | {{ generated_at }}
        </div>
    </footer>

    <script>
        // Step navigation
        function goToStep(stepNum) {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.step-indicator').forEach(el => {
                el.classList.remove('active');
                if (parseInt(el.dataset.step) < stepNum) el.classList.add('completed');
                else el.classList.remove('completed');
            });
            const target = document.querySelector(`[data-step-content="${stepNum}"]`);
            const indicator = document.querySelector(`[data-step="${stepNum}"]`);
            if (target) target.classList.add('active');
            if (indicator) indicator.classList.add('active');

            // Update progress bar
            const total = document.querySelectorAll('.step-content').length;
            const progress = document.querySelector('.progress-bar');
            if (progress) progress.style.width = `${(stepNum / total) * 100}%`;
        }

        // Accordion toggle
        function toggleAccordion(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('open');
            const icon = document.querySelector(`[data-accordion-icon="${id}"]`);
            if (icon) icon.classList.toggle('rotate-180');
        }

        // Initialize first step
        document.addEventListener('DOMContentLoaded', () => {
            const firstStep = document.querySelector('.step-content');
            if (firstStep) goToStep(1);
        });
    </script>
</body>
</html>
